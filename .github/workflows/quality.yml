name: quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest

    env:
      APP_ENV: testing
      APP_DEBUG: true
      CACHE_STORE: file
      CACHE_DRIVER: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
      DB_CONNECTION: sqlite
      DB_DATABASE: database/database.sqlite
      MAIL_MAILER: log
      BROADCAST_CONNECTION: log
      FILESYSTEM_DISK: local

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, dom, fileinfo, sqlite, pdo_sqlite
          coverage: none

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: composer install --no-interaction --prefer-dist --no-progress
      - run: npm ci

      - run: cp .env.example .env

      - name: Force CI environment
        run: |
          sed -i 's/^APP_ENV=.*/APP_ENV=testing/' .env
          sed -i 's/^APP_DEBUG=.*/APP_DEBUG=true/' .env
          sed -i 's/^CACHE_STORE=.*/CACHE_STORE=file/' .env
          sed -i 's/^CACHE_DRIVER=.*/CACHE_DRIVER=file/' .env
          sed -i 's/^SESSION_DRIVER=.*/SESSION_DRIVER=file/' .env
          sed -i 's/^QUEUE_CONNECTION=.*/QUEUE_CONNECTION=sync/' .env
          sed -i 's/^DB_CONNECTION=.*/DB_CONNECTION=sqlite/' .env
          sed -i 's|^DB_DATABASE=.*|DB_DATABASE=database/database.sqlite|' .env
          sed -i 's/^MAIL_MAILER=.*/MAIL_MAILER=log/' .env
          sed -i 's/^BROADCAST_CONNECTION=.*/BROADCAST_CONNECTION=log/' .env
          sed -i 's/^FILESYSTEM_DISK=.*/FILESYSTEM_DISK=local/' .env

          rm -f bootstrap/cache/config.php
          rm -f bootstrap/cache/services.php
          rm -f bootstrap/cache/packages.php

          mkdir -p storage/framework/views storage/framework/cache storage/framework/cache/data storage/framework/sessions storage/logs bootstrap/cache database
          touch database/database.sqlite

      - run: php artisan key:generate
      - run: composer validate

      - name: Debug Laravel runtime config
        run: |
          php artisan tinker --execute="dump(config('cache.default')); dump(config('session.driver')); dump(config('queue.default')); dump(config('database.default')); dump(config('database.connections.sqlite.database'));"

      - name: Clear Laravel bootstrap cache safely
        run: |
          rm -f bootstrap/cache/config.php
          rm -f bootstrap/cache/services.php
          rm -f bootstrap/cache/packages.php
          php artisan config:clear
          php artisan route:clear
          php artisan view:clear

      - run: ./vendor/bin/pint --test
      - run: npm run build
      - run: php -d memory_limit=-1 ./vendor/bin/phpunit --configuration phpunit.xml
      - run: php artisan route:list --except-vendor
      - run: ./vendor/bin/phpstan analyse --memory-limit=1G -v
