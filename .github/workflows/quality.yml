name: quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest

    env:
      APP_ENV: testing
      APP_DEBUG: true
      APP_URL: http://localhost
      CACHE_STORE: file
      CACHE_DRIVER: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
      DB_CONNECTION: sqlite
      DB_DATABASE: database/database.sqlite
      MAIL_MAILER: log
      BROADCAST_CONNECTION: log
      FILESYSTEM_DISK: local

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, dom, fileinfo, sqlite, pdo_sqlite
          coverage: none

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Validate Composer metadata
        run: composer validate --strict

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Install Node dependencies
        run: npm ci

      - name: Prepare Laravel CI environment
        run: |
          cat > .env <<'ENV'
          APP_NAME="CRM Habitacao Publica"
          APP_ENV=testing
          APP_KEY=
          APP_DEBUG=true
          APP_URL=http://localhost

          APP_LOCALE=pt
          APP_FALLBACK_LOCALE=pt
          APP_FAKER_LOCALE=pt_PT

          LOG_CHANNEL=stack
          LOG_LEVEL=debug

          DB_CONNECTION=sqlite
          DB_DATABASE=database/database.sqlite

          CACHE_STORE=file
          CACHE_DRIVER=file
          SESSION_DRIVER=file
          QUEUE_CONNECTION=sync
          MAIL_MAILER=log
          BROADCAST_CONNECTION=log
          FILESYSTEM_DISK=local

          VITE_APP_NAME="${APP_NAME}"
          ENV

          rm -f bootstrap/cache/config.php bootstrap/cache/services.php bootstrap/cache/packages.php
          mkdir -p bootstrap/cache database storage/framework/views storage/framework/cache/data storage/framework/sessions storage/logs
          touch database/database.sqlite

      - name: Generate application key
        run: php artisan key:generate --no-interaction

      - name: Clear Laravel bootstrap cache safely
        run: |
          rm -f bootstrap/cache/config.php bootstrap/cache/services.php bootstrap/cache/packages.php
          php artisan config:clear
          php artisan route:clear
          php artisan view:clear

      - name: Debug Laravel runtime config
        run: |
          php artisan tinker --execute="dump(config('cache.default')); dump(config('session.driver')); dump(config('queue.default')); dump(config('database.default')); dump(config('database.connections.sqlite.database'));"

      - name: Check code style
        run: ./vendor/bin/pint --test

      - name: Build frontend assets
        run: npm run build

      - name: Run PHPUnit test suite
        run: php -d memory_limit=-1 ./vendor/bin/phpunit --configuration phpunit.xml

      - name: Validate route registration
        run: php artisan route:list --except-vendor

      - name: Run static analysis
        run: ./vendor/bin/phpstan analyse --memory-limit=1G -v
